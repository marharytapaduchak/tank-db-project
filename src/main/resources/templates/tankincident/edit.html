<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edit Tank Incident</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background: #f7f7f7;
        }
        .container {
            max-width: 700px;
            margin: 0 auto;
            background: white;
            padding: 24px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        label {
            display: block;
            margin-top: 14px;
            margin-bottom: 6px;
            font-weight: 600;
        }
        input, textarea, select {
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
        }
        .buttons {
            margin-top: 20px;
            display: flex;
            gap: 10px;
        }
        .btn {
            padding: 10px 14px;
            border: none;
            border-radius: 6px;
            text-decoration: none;
            cursor: pointer;
            font-size: 14px;
        }
        .btn-save {
            background: #28a745;
            color: white;
        }
        .btn-cancel {
            background: #6c757d;
            color: white;
        }
        .readonly {
            background: #eeeeee;
        }
    </style>
</head>
<body>
<div class="container">
    <h1 th:text="${pageTitle}">Edit Tank Incident</h1>

    <form th:action="@{${formAction}}" method="post">
        <label for="incidentId">Incident ID</label>
        <input id="incidentId" type="number" th:value="${incident.incidentId()}" class="readonly" readonly>

        <label for="tankId">Tank ID</label>
        <input id="tankId" name="tankId" type="number" min="1" th:value="${incident.tankId()}" required>

        <label for="incidentDate">Incident Date</label>
        <input id="incidentDate" name="incidentDate" type="date" th:value="${incident.incidentDate()}" required>

        <label for="incidentType">Incident Type</label>
        <input id="incidentType" name="incidentType" type="text" th:value="${incident.incidentType()}" required>

        <label for="description">Description</label>
        <textarea id="description" name="description" rows="4" th:text="${incident.description()}"></textarea>

        <label for="severityLevel">Severity Level</label>
        <select id="severityLevel" name="severityLevel" required>
            <option value="">Select severity</option>
            <option value="Low" th:selected="${incident.severityLevel() == 'Low'}">Low</option>
            <option value="Medium" th:selected="${incident.severityLevel() == 'Medium'}">Medium</option>
            <option value="High" th:selected="${incident.severityLevel() == 'High'}">High</option>
        </select>

        <div class="buttons">
            <button class="btn btn-save" type="submit" th:text="${submitLabel}">Update Incident</button>
            <a class="btn btn-cancel" th:href="@{/tankincident}">Cancel</a>
        </div>
    </form>
</div>
</body>
</html>
