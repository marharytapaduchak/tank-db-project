<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Maintenance History Report</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            padding: 40px;
        }

        .container {
            max-width: 1000px;
            margin: auto;
        }

        h1 {
            margin-bottom: 30px;
        }

        .card {
            background: white;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.08);
        }

        .header {
            font-weight: bold;
            margin-bottom: 10px;
        }

        .date {
            color: #555;
            margin-bottom: 10px;
        }

        .inspection {
            background: #f1f1f1;
            padding: 10px;
            border-radius: 6px;
            margin-top: 8px;
        }

        .passed {
            color: #198754;
            font-weight: bold;
        }

        .failed {
            color: #dc3545;
            font-weight: bold;
        }

        .btn {
            margin-top: 20px;
            display: inline-block;
            padding: 10px 15px;
            background: #6c757d;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Maintenance History</h1>

    <div th:if="${#lists.isEmpty(rows)}">
        No maintenance records found.
    </div>

    <div th:each="row : ${rows}" class="card">
        <div class="header">
            Maintenance ID: <span th:text="${row.recordId()}"></span>
        </div>

        <div>
            Type: <span th:text="${row.maintenanceType()}"></span>
        </div>

        <div class="date">
            Date: <span th:text="${row.maintenanceDate()}"></span>
        </div>

        <div th:if="${row.inspectionId() != null}" class="inspection">
            Inspection:
            <span th:text="${row.inspectionType()}"></span> →
            <span th:text="${row.inspectionResult()}"
                  th:classappend="${row.inspectionResult() == 'Passed'} ? 'passed' : 'failed'">
            </span>
        </div>
    </div>

    <a class="btn" th:href="@{/tank/report/{id}(id=${tankId})}">Back</a>
</div>
</body>
</html>
