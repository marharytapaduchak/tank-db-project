<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Assignment History Report</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            padding: 40px;
        }

        .container {
            max-width: 900px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
        }

        h1 {
            margin-bottom: 30px;
        }

        .timeline {
            position: relative;
            margin-left: 20px;
        }

        .timeline::before {
            content: "";
            position: absolute;
            left: 10px;
            top: 0;
            width: 2px;
            height: 100%;
            background: #ccc;
        }

        .event {
            position: relative;
            margin-bottom: 30px;
            padding-left: 40px;
        }

        .event::before {
            content: "";
            position: absolute;
            left: 0;
            top: 5px;
            width: 20px;
            height: 20px;
            background: #0d6efd;
            border-radius: 50%;
        }

        .date {
            font-weight: bold;
            margin-bottom: 5px;
        }

        .status {
            font-size: 14px;
            color: #555;
        }

        .btn {
            margin-top: 30px;
            display: inline-block;
            padding: 10px 15px;
            background: #6c757d;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Assignment History</h1>

    <div th:if="${#lists.isEmpty(rows)}">
        No assignments found.
    </div>

    <div class="timeline">
        <div class="event" th:each="row : ${rows}">
            <div class="date">
                <span th:text="${row.startDate()}"></span>
                →
                <span th:text="${row.endDate()}"></span>
            </div>

            <div>
                Assignment ID: <span th:text="${row.assignmentId()}"></span>
            </div>

            <div class="status">
                <span th:if="${row.endDate() == null}">Active</span>
                <span th:if="${row.endDate() != null}">Completed</span>
            </div>
        </div>
    </div>

    <a class="btn" th:href="@{/tank/report/{id}(id=${tankId})}">Back</a>
</div>
</body>
</html>
