<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Tank Reports</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background: #f7f7f7;
        }
        .container {
            max-width: 700px;
            margin: 0 auto;
            background: white;
            padding: 24px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        h1 {
            margin-top: 0;
        }
        .report-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 20px;
        }
        .btn {
            display: inline-block;
            padding: 12px 16px;
            border-radius: 6px;
            text-decoration: none;
            color: white;
            font-weight: 600;
        }
        .btn-report {
            background: #0d6efd;
        }
        .btn-back {
            background: #6c757d;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Reports for Tank <span th:text="${tankId}"></span></h1>

    <div class="report-list">
        <a class="btn btn-report" th:href="@{/tank/report/assignment/{id}(id=${tankId})}">
            Assignment History Report
        </a>

        <a class="btn btn-report" th:href="@{/tank/report/maintenance/{id}(id=${tankId})}">
            Maintenance History Report
        </a>

        <a class="btn btn-report" th:href="@{/tank/report/readiness/{id}(id=${tankId})}">
            Readiness Overview Report
        </a>

        <a class="btn btn-back" th:href="@{/tank}">
            Back to Tank Registration
        </a>
    </div>
</div>
</body>
</html>
