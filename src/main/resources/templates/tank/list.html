<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Tank Registration</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background: #f7f7f7;
        }
        .container {
            max-width: 1300px;
            margin: 0 auto;
            background: white;
            padding: 24px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        h1 {
            margin-top: 0;
        }
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .btn {
            display: inline-block;
            padding: 10px 14px;
            border: none;
            border-radius: 6px;
            text-decoration: none;
            cursor: pointer;
            font-size: 14px;
        }
        .btn-report {
            background: #0d6efd;
            color: white;
        }
        .btn-add {
            background: #28a745;
            color: white;
        }
        .btn-edit {
            background: #f0ad4e;
            color: white;
        }
        .btn-delete {
            background: #dc3545;
            color: white;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }
        th, td {
            padding: 12px;
            border-bottom: 1px solid #ddd;
            text-align: left;
            vertical-align: top;
        }
        th {
            background: #f1f1f1;
        }
        .message {
            padding: 12px;
            background: #e9f7ef;
            color: #1e7e34;
            border: 1px solid #b7ebc6;
            border-radius: 6px;
            margin-bottom: 16px;
        }
        .error {
            padding: 12px;
            background: #fdecea;
            color: #b02a37;
            border: 1px solid #f5c2c7;
            border-radius: 6px;
            margin-bottom: 16px;
        }
        .actions {
            display: flex;
            gap: 8px;
        }
        form {
            display: inline;
        }
    </style>
    <script>
        function confirmDelete() {
            return confirm('Are you sure you want to delete this tank?');
        }
    </script>
</head>
<body>
<div class="container">
    <div class="top-bar">
        <h1>Tank Registration</h1>
        <div style="display:flex; gap:10px;">
            <a class="btn btn-add" th:href="@{/tank/create}">Add New Tank</a>
            <a class="btn btn-add" th:href="@{/tankincident}">Incidents</a>
            <a class="btn btn-add" th:href="@{/tankassignment}">Assignments</a>
        </div>
    </div>

    <div class="message" th:if="${successMessage != null and !successMessage.isEmpty()}" th:text="${successMessage}"></div>
    <div class="error" th:if="${errorMessage != null and !errorMessage.isEmpty()}" th:text="${errorMessage}"></div>

    <table>
        <thead>
        <tr>
            <th>Tank ID</th>
            <th>Factory Serial Number</th>
            <th>Production Year</th>
            <th>Current Base Location</th>
            <th>Country</th>
            <th>City</th>
            <th>Facility Name</th>
            <th>Model ID</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="tank : ${tanks}">
            <td th:text="${tank.tankId()}"></td>
            <td th:text="${tank.factorySerialNumber()}"></td>
            <td th:text="${tank.productionYear()}"></td>
            <td th:text="${tank.currentBaseLocation()}"></td>
            <td th:text="${tank.country()}"></td>
            <td th:text="${tank.city()}"></td>
            <td th:text="${tank.facilityName()}"></td>
            <td th:text="${tank.modelId()}"></td>
            <td>
                <div class="actions">
                    <a class="btn btn-edit" th:href="@{/tank/edit/{id}(id=${tank.tankId()})}">Edit</a>
                    <form th:action="@{/tank/delete/{id}(id=${tank.tankId()})}" method="post" onsubmit="return confirmDelete();">
                        <button class="btn btn-delete" type="submit">Delete</button>
                    </form>
                    <a class="btn btn-report" th:href="@{/tank/report/{id}(id=${tank.tankId()})}">Reports</a>
                </div>
            </td>
        </tr>
        <tr th:if="${#lists.isEmpty(tanks)}">
            <td colspan="9">No tanks found.</td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
